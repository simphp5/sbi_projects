<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="/sbi_site_manifest.json">
<link rel="apple-touch-icon" href="/assets/sbi_projects/site_app/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Site">
<meta name="mobile-web-app-capable" content="yes">
<title>Site Attendance</title>
<style>
:root{
  --ink:#111111;
  --ink-soft:#5a5a5a;
  --paper:#f2f0ec;
  --card:#ffffff;
  --rule:#d6d2cb;
  --brand:#be1e2d;
  --brand-dark:#8f1622;
  --go:#0f6b3f;
  --wait:#a86a00;
  --stop:#7a1010;
  --tap:72px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--paper);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-size:17px;line-height:1.35;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:-0.02em}
.num{font-variant-numeric:tabular-nums}

/* ---------- shell ---------- */
.top{
  position:sticky;top:0;z-index:20;
  background:var(--ink);color:#fff;
  padding:10px 14px;display:flex;align-items:center;gap:12px;
}
.top .mark{width:10px;height:26px;background:var(--brand);flex:0 0 auto}
.top .site{font-weight:800;font-size:15px;letter-spacing:0.01em;flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top button{
  background:transparent;border:1px solid #444;color:#fff;
  padding:8px 12px;font-size:14px;font-weight:700;border-radius:2px;
}
.wrap{max-width:760px;margin:0 auto;padding:14px}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--ink);margin-bottom:14px}
.tabs button{
  flex:1;background:transparent;border:0;border-bottom:4px solid transparent;
  padding:14px 6px;font-size:15px;font-weight:800;color:var(--ink-soft);
  margin-bottom:-2px;
}
.tabs button[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--brand)}

/* ---------- camera ---------- */
.stage{position:relative;background:#000;border:2px solid var(--ink);aspect-ratio:4/3;overflow:hidden}
.stage video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.stage canvas{display:none}
.reticle{
  position:absolute;inset:14% 22%;border:3px solid rgba(255,255,255,.55);
  border-radius:50%/42%;pointer-events:none;transition:border-color .18s
}
.stage[data-face="yes"] .reticle{border-color:#39d98a}
.badge{
  position:absolute;left:0;bottom:0;right:0;padding:10px 12px;
  background:rgba(0,0,0,.72);color:#fff;font-weight:700;font-size:15px;
  display:flex;justify-content:space-between;gap:10px
}
.badge .who{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge .score{opacity:.75;font-size:13px}

/* ---------- day track: the signature element ---------- */
.track{margin:16px 0 6px;border:2px solid var(--ink);background:var(--card)}
.track h3{font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  padding:9px 12px;border-bottom:1px solid var(--rule);color:var(--ink-soft)}
.track ol{list-style:none;margin:0;padding:0;display:flex}
.track li{
  flex:1;padding:11px 6px;text-align:center;border-right:1px solid var(--rule);
  font-size:11px;font-weight:800;letter-spacing:.06em;color:#b3aea6;
}
.track li:last-child{border-right:0}
.track li b{display:block;font-size:15px;letter-spacing:0;margin-top:3px;
  font-variant-numeric:tabular-nums}
.track li[data-done="1"]{color:var(--ink);background:#eceae5}
.track li[data-now="1"]{background:var(--ink);color:#fff}

/* ---------- punch buttons ---------- */
.punches{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.punch{
  min-height:var(--tap);border:2px solid var(--ink);background:var(--card);
  font-size:19px;font-weight:800;letter-spacing:.02em;color:var(--ink);
  display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;
}
.punch:active{transform:translateY(1px)}
.punch[data-kind="in"]{background:var(--go);border-color:var(--go);color:#fff}
.punch[data-kind="out"]{background:var(--stop);border-color:var(--stop);color:#fff}
.punch[data-kind="break"]{background:var(--card);color:var(--wait);border-color:var(--wait)}
.punch:disabled{opacity:.32}
.punch.wide{grid-column:1 / -1}

/* ---------- forms ---------- */
label{display:block;font-size:12px;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink-soft);margin:14px 0 5px}
input,select{
  width:100%;min-height:54px;padding:12px;font-size:17px;font-family:inherit;
  border:2px solid var(--rule);background:var(--card);color:var(--ink);border-radius:0
}
input:focus,select:focus,button:focus-visible{outline:3px solid var(--brand);outline-offset:1px}
.primary{
  width:100%;min-height:var(--tap);margin-top:18px;
  background:var(--brand);border:2px solid var(--brand);color:#fff;
  font-size:19px;font-weight:800;letter-spacing:.02em
}
.primary:active{background:var(--brand-dark)}
.primary:disabled{opacity:.4}

/* ---------- roster ---------- */
.roster{margin-top:6px;border:2px solid var(--ink);background:var(--card)}
.person{display:flex;align-items:center;gap:12px;padding:11px 12px;
  border-bottom:1px solid var(--rule)}
.person:last-child{border-bottom:0}
.avatar{width:44px;height:44px;flex:0 0 auto;background:#ddd8d0;border:1px solid var(--rule);
  object-fit:cover}
.person .nm{flex:1;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis}
.person .nm small{display:block;font-weight:500;color:var(--ink-soft);font-size:13px}
.pill{font-size:11px;font-weight:800;letter-spacing:.08em;padding:5px 8px;border:1px solid}
.pill.on{color:var(--go);border-color:var(--go)}
.pill.off{color:var(--ink-soft);border-color:var(--rule)}
.pill.new{color:var(--brand);border-color:var(--brand)}

/* ---------- status ---------- */
.note{padding:12px;border-left:5px solid var(--ink);background:var(--card);
  margin-top:14px;font-size:15px}
.note[data-tone="ok"]{border-left-color:var(--go)}
.note[data-tone="warn"]{border-left-color:var(--wait)}
.note[data-tone="err"]{border-left-color:var(--brand)}
.muted{color:var(--ink-soft);font-size:14px}
.hidden{display:none !important}
.queue{position:fixed;left:0;right:0;bottom:0;background:var(--wait);color:#fff;
  padding:9px 14px;font-weight:700;font-size:14px;text-align:center}
@media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>

<div class="top">
  <span class="mark"></span>
  <span class="site" id="siteLabel">Choose a site</span>
  <button id="btnInstall" type="button" class="hidden">Install</button>
  <button id="btnSwitch" type="button">Change</button>
</div>

<div class="wrap">

  <!-- site chooser -->
  <section id="pickSite">
    <h1 style="font-size:26px;margin-bottom:4px">Site attendance</h1>
    <p class="muted">Pick the site you are working at today.</p>
    <label for="siteSelect">Site</label>
    <select id="siteSelect"></select>
    <button class="primary" id="btnStart" type="button">Start</button>
  </section>

  <!-- main -->
  <section id="main" class="hidden">
    <div class="tabs" role="tablist">
      <button id="tabPunch"  role="tab" aria-selected="true"  type="button">Attendance</button>
      <button id="tabEnroll" role="tab" aria-selected="false" type="button">Add person</button>
      <button id="tabList"   role="tab" aria-selected="false" type="button">Today</button>
    </div>

    <!-- punch -->
    <div id="panePunch">
      <div class="stage" id="stage" data-face="no">
        <video id="video" playsinline muted autoplay></video>
        <div class="reticle"></div>
        <div class="badge">
          <span class="who" id="who">Looking for a face</span>
          <span class="score" id="score"></span>
        </div>
      </div>
      <canvas id="canvas"></canvas>

      <div class="track" id="track">
        <h3>Today</h3>
        <ol>
          <li data-step="IN">In<b>--:--</b></li>
          <li data-step="TEA">Tea<b>--:--</b></li>
          <li data-step="LUNCH">Lunch<b>--:--</b></li>
          <li data-step="OUT">Out<b>--:--</b></li>
        </ol>
      </div>

      <div class="punches" id="punches"></div>
      <div class="note" id="punchNote" data-tone="">Hold the phone steady and look at the camera.</div>
    </div>

    <!-- enroll -->
    <div id="paneEnroll" class="hidden">
      <div class="stage" id="stage2" data-face="no">
        <video id="video2" playsinline muted autoplay></video>
        <div class="reticle"></div>
        <div class="badge"><span class="who" id="who2">Looking for a face</span></div>
      </div>
      <label for="enName">Name</label>
      <input id="enName" type="text" autocomplete="off" placeholder="Full name">
      <label for="enGender">Gender</label>
      <select id="enGender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
      <label for="enSkill">Skill</label>
      <select id="enSkill">
        <option value="">Not set</option>
        <option>Mason</option><option>Helper</option><option>Bar Bender</option>
        <option>Carpenter</option><option>Electrician</option><option>Welder</option>
        <option>Operator</option><option>Supervisor</option><option>Other</option>
      </select>
      <label for="enWage">Wage type</label>
      <select id="enWage"><option value="">Not set</option></select>
      <label for="enRate">Wage rate</label>
      <input id="enRate" type="number" inputmode="decimal" placeholder="0">
      <label for="enPhone">Phone</label>
      <input id="enPhone" type="tel" inputmode="tel" autocomplete="off" placeholder="Optional">
      <button class="primary" id="btnEnroll" type="button">Add to site</button>
      <div class="note" id="enrollNote" data-tone="">Face the camera, then fill in the name.</div>
    </div>

    <!-- roster -->
    <div id="paneList" class="hidden">
      <div class="roster" id="roster"></div>
      <button class="primary" id="btnRefresh" type="button">Refresh</button>
    </div>
  </section>
</div>

<div class="queue hidden" id="queueBar"></div>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script>
(function () {
  "use strict";

  var MODELS = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";
  var CSRF = "{{ csrf_token }}";
  var PROJECTS = {{ frappe.as_json(projects) }};
  var QKEY = "sbi_punch_queue";

  var state = {
    project: null, ready: false, descriptor: null,
    labour: null, labourName: null, allowed: [], busy: false, gps: null
  };

  var $ = function (id) { return document.getElementById(id); };

  // ---------- server ----------
  function call(method, args) {
    return fetch("/api/method/sbi_projects.sbi_projects." + method, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Frappe-CSRF-Token": CSRF },
      body: JSON.stringify(args || {})
    }).then(function (r) {
      return r.json().then(function (j) {
        if (!r.ok) {
          var msg = (j && (j._server_messages || j.exception || j.message)) || ("HTTP " + r.status);
          try { msg = JSON.parse(msg)[0]; msg = JSON.parse(msg).message || msg; } catch (e) {}
          throw new Error(String(msg));
        }
        return j.message;
      });
    });
  }

  function note(el, tone, text) {
    el.setAttribute("data-tone", tone);
    el.textContent = text;
  }

  // ---------- gps ----------
  function watchGps() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(
      function (p) { state.gps = { lat: p.coords.latitude, lng: p.coords.longitude }; },
      function () { state.gps = null; },
      { enableHighAccuracy: true, maximumAge: 15000, timeout: 12000 }
    );
  }

  // ---------- camera ----------
  function startCamera(videoEl) {
    return navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    }).then(function (stream) {
      videoEl.srcObject = stream;
      return videoEl.play();
    });
  }

  function loadModels() {
    return Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODELS),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODELS),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODELS)
    ]).then(function () { state.ready = true; });
  }

  function detect(videoEl) {
    var opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 });
    return faceapi.detectSingleFace(videoEl, opts)
      .withFaceLandmarks(true)
      .withFaceDescriptor();
  }

  // ---------- punch loop ----------
  var lastLookup = 0;
  function punchLoop() {
    if (!state.ready || state.busy || $("panePunch").classList.contains("hidden")) {
      return setTimeout(punchLoop, 700);
    }
    detect($("video")).then(function (res) {
      var stage = $("stage");
      if (!res) {
        stage.setAttribute("data-face", "no");
        $("who").textContent = "Looking for a face";
        $("score").textContent = "";
        state.descriptor = null; state.labour = null;
        renderPunches([]);
        return;
      }
      stage.setAttribute("data-face", "yes");
      state.descriptor = Array.prototype.slice.call(res.descriptor);

      var now = Date.now();
      if (now - lastLookup < 1800) return;
      lastLookup = now;

      call("site_api.match_face", { embedding: state.descriptor, project: state.project })
        .then(function (m) {
          if (!m) {
            $("who").textContent = "Not enrolled";
            $("score").textContent = "";
            state.labour = null;
            renderPunches([]);
            note($("punchNote"), "warn", "This face is not enrolled. Use Add person.");
            return;
          }
          state.labour = m.labour;
          state.labourName = m.labour_name;
          $("who").textContent = m.labour_name;
          $("score").textContent = "match " + Math.round(m.score * 100) + "%";
          return refreshDay(m.labour);
        })
        .catch(function (e) { note($("punchNote"), "err", e.message); });
    }).catch(function () {
      /* a dropped frame is not worth surfacing */
    }).then(function () { setTimeout(punchLoop, 700); });
  }

  function refreshDay(labour) {
    return call("doctype.labour_attendance_log.labour_attendance_log.get_day_status",
                { labour: labour })
      .then(function (s) {
        state.allowed = s.allowed_next || [];
        paintTrack(s.punches || []);
        renderPunches(state.allowed);
        if (!state.allowed.length) {
          note($("punchNote"), "ok", state.labourName + " has finished for today.");
        } else {
          note($("punchNote"), "", "Tap a button to record the punch.");
        }
      });
  }

  function paintTrack(punches) {
    var map = { "IN": "IN", "TEA OUT": "TEA", "TEA IN": "TEA",
                "LUNCH OUT": "LUNCH", "LUNCH IN": "LUNCH", "OUT": "OUT" };
    var seen = {};
    punches.forEach(function (p) {
      var step = map[p.log_type];
      if (step) seen[step] = String(p.log_datetime).slice(11, 16);
    });
    var last = punches.length ? map[punches[punches.length - 1].log_type] : null;
    Array.prototype.forEach.call($("track").querySelectorAll("li"), function (li) {
      var k = li.getAttribute("data-step");
      li.setAttribute("data-done", seen[k] ? "1" : "0");
      li.setAttribute("data-now", k === last ? "1" : "0");
      li.querySelector("b").textContent = seen[k] || "--:--";
    });
  }

  var KIND = { "IN": "in", "OUT": "out", "LUNCH OUT": "break", "LUNCH IN": "break",
               "TEA OUT": "break", "TEA IN": "break" };

  function renderPunches(allowed) {
    var box = $("punches");
    box.innerHTML = "";
    if (!allowed.length) return;
    allowed.forEach(function (t, i) {
      var b = document.createElement("button");
      b.type = "button";
      b.className = "punch" + (allowed.length % 2 === 1 && i === 0 ? " wide" : "");
      b.setAttribute("data-kind", KIND[t] || "break");
      b.textContent = t;
      b.onclick = function () { doPunch(t); };
      box.appendChild(b);
    });
  }

  function doPunch(logType) {
    if (!state.labour || state.busy) return;
    state.busy = true;
    note($("punchNote"), "", "Recording " + logType + "...");

    var payload = {
      project: state.project,
      log_type: logType,
      embedding: state.descriptor,
      latitude: state.gps ? state.gps.lat : null,
      longitude: state.gps ? state.gps.lng : null,
      photo: snapshot($("video")),
      device_id: deviceId()
    };

    call("site_api.punch", payload)
      .then(function (r) {
        if (!r || !r.matched) {
          note($("punchNote"), "warn", (r && r.message) || "No match.");
          return;
        }
        var extra = r.within_geofence ? "" :
          "  Outside the site boundary by " + Math.round(r.distance_from_site) + " m.";
        note($("punchNote"), r.within_geofence ? "ok" : "warn",
             r.labour_name + " - " + r.log_type + " at " + String(r.time).slice(11, 16) + "." + extra);
        return refreshDay(r.labour);
      })
      .catch(function (e) {
        if (!navigator.onLine) {
          queuePush(payload);
          note($("punchNote"), "warn", "No network. Saved on this device and will send later.");
        } else {
          note($("punchNote"), "err", e.message);
        }
      })
      .then(function () { state.busy = false; });
  }

  function snapshot(videoEl) {
    var c = $("canvas");
    c.width = 320;
    c.height = Math.round(320 * (videoEl.videoHeight || 480) / (videoEl.videoWidth || 640));
    c.getContext("2d").drawImage(videoEl, 0, 0, c.width, c.height);
    return c.toDataURL("image/jpeg", 0.7);
  }

  function deviceId() {
    var k = "sbi_device_id";
    var v = localStorage.getItem(k);
    if (!v) {
      v = "dev-" + Math.random().toString(36).slice(2, 10);
      localStorage.setItem(k, v);
    }
    return v;
  }

  // ---------- offline queue ----------
  function queueRead() {
    try { return JSON.parse(localStorage.getItem(QKEY) || "[]"); } catch (e) { return []; }
  }
  function queuePush(item) {
    var q = queueRead(); q.push(item);
    localStorage.setItem(QKEY, JSON.stringify(q));
    paintQueue();
  }
  function paintQueue() {
    var n = queueRead().length;
    var bar = $("queueBar");
    bar.classList.toggle("hidden", n === 0);
    bar.textContent = n + " punch" + (n === 1 ? "" : "es") + " waiting to send";
  }
  function queueFlush() {
    var q = queueRead();
    if (!q.length || !navigator.onLine) return;
    var item = q[0];
    call("site_api.punch", item).then(function () {
      var rest = queueRead(); rest.shift();
      localStorage.setItem(QKEY, JSON.stringify(rest));
      paintQueue();
      queueFlush();
    }).catch(function () { /* try again on the next tick */ });
  }

  // ---------- enroll ----------
  function enrollLoop() {
    if (!state.ready || $("paneEnroll").classList.contains("hidden")) {
      return setTimeout(enrollLoop, 800);
    }
    detect($("video2")).then(function (res) {
      var ok = !!res;
      $("stage2").setAttribute("data-face", ok ? "yes" : "no");
      $("who2").textContent = ok ? "Face captured" : "Looking for a face";
      state.enrollDescriptor = ok ? Array.prototype.slice.call(res.descriptor) : null;
    }).catch(function () {}).then(function () { setTimeout(enrollLoop, 800); });
  }

  function doEnroll() {
    var name = $("enName").value.trim();
    if (!name) { note($("enrollNote"), "warn", "Enter the person's name."); return; }
    if (!state.enrollDescriptor) { note($("enrollNote"), "warn", "Face the camera first."); return; }

    $("btnEnroll").disabled = true;
    note($("enrollNote"), "", "Adding " + name + "...");

    call("site_api.enroll_labour", {
      labour_name: name,
      gender: $("enGender").value,
      skill_category: $("enSkill").value || null,
      phone: $("enPhone").value.trim() || null,
      wage_type: $("enWage").value || null,
      wage_rate: $("enRate").value || 0,
      project: state.project,
      embedding: state.enrollDescriptor,
      photo: snapshot($("video2"))
    }).then(function (r) {
      note($("enrollNote"), "ok", r.labour_name + " added. They can punch in now.");
      $("enName").value = ""; $("enPhone").value = ""; $("enRate").value = "";
    }).catch(function (e) {
      note($("enrollNote"), "err", e.message);
    }).then(function () { $("btnEnroll").disabled = false; });
  }

  // ---------- roster ----------
  function loadRoster() {
    var box = $("roster");
    box.innerHTML = '<div class="person"><span class="nm muted">Loading...</span></div>';
    call("site_api.get_site_roster", { project: state.project }).then(function (rows) {
      box.innerHTML = "";
      if (!rows.length) {
        box.innerHTML = '<div class="person"><span class="nm muted">' +
          'No one is on this site yet. Use Add person.</span></div>';
        return;
      }
      rows.forEach(function (p) {
        var d = document.createElement("div");
        d.className = "person";
        var img = p.photo
          ? '<img class="avatar" src="' + p.photo + '" alt="">'
          : '<span class="avatar"></span>';
        var pill = !p.enrolled
          ? '<span class="pill new">NO FACE</span>'
          : (p.last_punch && p.last_punch !== "OUT"
              ? '<span class="pill on">' + p.last_punch + '</span>'
              : '<span class="pill off">' + (p.last_punch || "NOT IN") + '</span>');
        d.innerHTML = img + '<span class="nm">' + esc(p.labour_name) +
          '<small>' + esc(p.skill_category || "") + '</small></span>' + pill;
        box.appendChild(d);
      });
    }).catch(function (e) {
      box.innerHTML = '<div class="person"><span class="nm">' + esc(e.message) + '</span></div>';
    });
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---------- tabs ----------
  function showTab(which) {
    var map = { punch: "panePunch", enroll: "paneEnroll", list: "paneList" };
    Object.keys(map).forEach(function (k) {
      $(map[k]).classList.toggle("hidden", k !== which);
      $("tab" + k.charAt(0).toUpperCase() + k.slice(1))
        .setAttribute("aria-selected", String(k === which));
    });
    if (which === "list") loadRoster();
  }

  // ---------- boot ----------
  function boot() {
    var sel = $("siteSelect");
    PROJECTS.forEach(function (p) {
      var o = document.createElement("option");
      o.value = p.name;
      o.textContent = p.project_name || p.name;
      sel.appendChild(o);
    });

    var saved = localStorage.getItem("sbi_site");
    if (saved) sel.value = saved;

    $("btnStart").onclick = function () {
      state.project = sel.value;
      if (!state.project) return;
      localStorage.setItem("sbi_site", state.project);
      $("siteLabel").textContent = sel.options[sel.selectedIndex].text;
      $("pickSite").classList.add("hidden");
      $("main").classList.remove("hidden");
      begin();
    };

    $("btnSwitch").onclick = function () {
      $("main").classList.add("hidden");
      $("pickSite").classList.remove("hidden");
    };

    $("tabPunch").onclick = function () { showTab("punch"); };
    $("tabEnroll").onclick = function () { showTab("enroll"); };
    $("tabList").onclick = function () { showTab("list"); };
    $("btnEnroll").onclick = doEnroll;
    $("btnRefresh").onclick = loadRoster;

    window.addEventListener("online", queueFlush);
    paintQueue();
  }

  function begin() {
    watchGps();
    note($("punchNote"), "", "Loading face recognition...");

    Promise.all([
      startCamera($("video")),
      startCamera($("video2")),
      loadModels()
    ]).then(function () {
      note($("punchNote"), "", "Look at the camera.");
      punchLoop();
      enrollLoop();
      queueFlush();
      return call("site_api.get_site_roster", { project: state.project });
    }).then(function () {
      return fetch("/api/method/frappe.client.get_list?doctype=Wage%20Type&fields=[\"name\"]&limit_page_length=0",
                   { headers: { "X-Frappe-CSRF-Token": CSRF } })
        .then(function (r) { return r.json(); })
        .then(function (j) {
          (j.message || []).forEach(function (w) {
            var o = document.createElement("option");
            o.value = w.name; o.textContent = w.name;
            $("enWage").appendChild(o);
          });
        });
    }).catch(function (e) {
      note($("punchNote"), "err",
           "Camera or face models could not start. " + e.message);
    });
  }

  // ---------- installable app ----------
  function setupInstall() {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sbi_sw.js", { scope: "/site_app" })
        .catch(function () { /* app still works, just without offline cache */ });
    }

    var deferred = null;
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault();
      deferred = e;
      $("btnInstall").classList.remove("hidden");
    });

    $("btnInstall").onclick = function () {
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.then(function () {
        deferred = null;
        $("btnInstall").classList.add("hidden");
      });
    };

    window.addEventListener("appinstalled", function () {
      $("btnInstall").classList.add("hidden");
    });
  }

  setupInstall();
  boot();
})();
</script>
</body>
</html>
